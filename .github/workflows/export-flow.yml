name: Export Flow Tests

on:
  push:
    branches:
      - 'feat/**'

jobs:
  export-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: e2e

      - name: Run export flow tests
        run: npx playwright test portal/flows/export.spec.ts --reporter=list
        working-directory: e2e
        env:
          PORTAL_URL:           ${{ secrets.STAGING_PORTAL_URL }}
          PORTAL_TEST_EMAIL:    ${{ secrets.PORTAL_TEST_EMAIL }}
          PORTAL_TEST_PASSWORD: ${{ secrets.PORTAL_TEST_PASSWORD }}

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
          retention-days: 7
